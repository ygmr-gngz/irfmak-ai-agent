name: Daily Content Generator

on:
  schedule:
    - cron: '0 6 * * *'   # 09:00 Türkiye
    - cron: '0 15 * * *'  # 18:00 Türkiye
  workflow_dispatch:

jobs:
  generate-content:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Debug Environment
        run: |
          echo "Checking required environment variables..."

          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "❌ OPENAI_API_KEY missing"
            exit 1
          fi

          if [ -z "${HEYGEN_API_KEY}" ]; then
            echo "❌ HEYGEN_API_KEY missing"
            exit 1
          fi

          if [ -z "${YOUTUBE_API_KEY}" ]; then
            echo "❌ YOUTUBE_API_KEY missing"
            exit 1
          fi

          echo "✅ Environment variables loaded"

        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HEYGEN_API_KEY: ${{ secrets.HEYGEN_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Run Content Generator
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}

          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

          HEYGEN_API_KEY: ${{ secrets.HEYGEN_API_KEY }}

          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

          NODE_ENV: production

        run: |
          echo "🚀 Starting content generator..."
          node generate-content.js

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: |
            *.log
            logs/
