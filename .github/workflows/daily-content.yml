name: Günlük İçerik Üreticisi

on:
  schedule:
    - cron: '0 6 * * *'   # Türkiye saati 09:00
    - cron: '0 15 * * *'  # Türkiye saati 18:00
  workflow_dispatch:

jobs:
  uret-icerik:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Depoyu Al
        uses: actions/checkout@v4

      - name: Node.js Kur
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Bağımlılıkları Yükle
        run: npm ci

      - name: Ortam Değişkenlerini Kontrol Et
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}

          HEYGEN_API_KEY: ${{ secrets.HEYGEN_API_KEY }}

          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          APP_URL: ${{ secrets.APP_URL }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_PRIVACY: ${{ secrets.YOUTUBE_PRIVACY }}
        run: |
          echo "Ortam değişkenleri kontrol ediliyor..."

          test -n "$OPENAI_API_KEY" || (echo "OPENAI_API_KEY eksik" && exit 1)
          test -n "$HEYGEN_API_KEY" || (echo "HEYGEN_API_KEY eksik" && exit 1)

          test -n "$SUPABASE_URL" || (echo "SUPABASE_URL eksik" && exit 1)
          test -n "$SUPABASE_ANON_KEY" || (echo "SUPABASE_ANON_KEY eksik" && exit 1)

          test -n "$APP_URL" || (echo "APP_URL eksik" && exit 1)

          test -n "$YOUTUBE_CLIENT_ID" || (echo "YOUTUBE_CLIENT_ID eksik" && exit 1)
          test -n "$YOUTUBE_CLIENT_SECRET" || (echo "YOUTUBE_CLIENT_SECRET eksik" && exit 1)
          test -n "$YOUTUBE_REFRESH_TOKEN" || (echo "YOUTUBE_REFRESH_TOKEN eksik" && exit 1)

          echo "Zorunlu değişkenler tamam."

      - name: İçerik Oluşturucuyu Çalıştır
        env:
          NODE_ENV: production

          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}

          HEYGEN_API_KEY: ${{ secrets.HEYGEN_API_KEY }}

          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

          APP_URL: ${{ secrets.APP_URL }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_PRIVACY: ${{ secrets.YOUTUBE_PRIVACY }}

        run: |
          echo "🚀 İçerik üreticisi başlatılıyor..."
          npm run auto

      - name: Hata Loglarını Kaydet
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hata-loglari
          path: |
            *.log
            logs/
            data/
            outputs/
          if-no-files-found: ignore

